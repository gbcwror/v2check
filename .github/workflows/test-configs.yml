name: Test v2ray Configs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

env:
  CONFIGS_PER_FILE: 500
  TEST_TIMEOUT: 5
  CONCURRENT_TESTS: 100
  TEST_URL: "http://gstatic.com/generate_204"
  REPO_URL: "https://raw.githubusercontent.com/${{ github.repository }}/main"

jobs:
  TestRealDelay:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Download latest Xray-core
        run: |
          LATEST=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r '.tag_name')
          
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Error: Failed to get latest Xray version"
            exit 1
          fi
          
          echo "Xray version: $LATEST"
          
          DOWNLOAD_URL="https://github.com/XTLS/Xray-core/releases/download/${LATEST}/Xray-linux-64.zip"
          echo "Download URL: $DOWNLOAD_URL"
          
          curl -sL -o xray.zip "$DOWNLOAD_URL"
          
          if ! file xray.zip | grep -q "Zip"; then
            echo "Error: Downloaded file is not a valid zip"
            exit 1
          fi
          
          unzip -o xray.zip xray -d /usr/local/bin/
          chmod +x /usr/local/bin/xray
          xray version

      - name: Run tester
        run: |
          python -u scripts/tester.py \
            --subscriptions subscription.txt \
            --xray /usr/local/bin/xray \
            --test-url "$TEST_URL" \
            --timeout "$TEST_TIMEOUT" \
            --concurrent "$CONCURRENT_TESTS" \
            --per-file "$CONFIGS_PER_FILE" \
            --repo-url "$REPO_URL"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md vless/ vmess/ ss/ trojan/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update tested configs $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
